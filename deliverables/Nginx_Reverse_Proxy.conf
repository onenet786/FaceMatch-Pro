# FaceMatch Pro: Production Nginx Reverse Proxy & Load Balancer
# Handles SSL Termination, Secure HTTP Headers, and Biometric API Rate-Limiting.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Disable version disclosures

    # --- SECURITY HEADERS ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- CLIENT BODY SIZES ---
    # Up to 15MB base64 images allowed for high-resolution bulk group matching
    client_max_body_size 15M;

    # --- RATE LIMITING SHIELDS ---
    # Limit requests per IP address to safeguard biometric matching endpoints
    limit_req_zone $binary_remote_addr zone=biometric_limit:10m rate=10r/s;

    upstream facematch_backend {
        server gateway-api:3000;
    }

    # Redirection HTTP to HTTPS
    server {
        listen 80;
        server_name facematchpro.com www.facematchpro.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS Production Server Block
    server {
        listen 443 ssl http2;
        server_name facematchpro.com www.facematchpro.com;

        # --- SSL CERTIFICATES ---
        ssl_certificate /etc/letsencrypt/live/facematchpro.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/facematchpro.com/privkey.pem;

        # --- SSL HARDENING PARAMETERS ---
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384";
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Static assets and Web Frontend routing
        location / {
            proxy_pass http://facematch_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Secure Rate-Limiting for Biometric Evaluation matching routes
        location /api/face/ {
            limit_req zone=biometric_limit burst=5 nodelay;
            
            proxy_pass http://facematch_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
